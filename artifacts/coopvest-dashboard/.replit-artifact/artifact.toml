kind = "web"
previewPath = "/"
title = "Coopvest Africa Admin Dashboard"
version = "1.0.0"
id = "artifacts/coopvest-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23018

[services.development]
run = "pnpm --filter @workspace/coopvest-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coopvest-dashboard", "run", "build" ]
publicDir = "artifacts/coopvest-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23018"
BASE_PATH = "/"
