openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CoopVest Africa Admin Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard overview
  - name: organizations
    description: Organization management
  - name: members
    description: Member management
  - name: savings
    description: Savings management
  - name: loans
    description: Loan management
  - name: payroll
    description: Payroll deduction
  - name: wallet
    description: E-Wallet management
  - name: risk
    description: Risk and credit score
  - name: notifications
    description: Notifications system
  - name: reports
    description: Reports and analytics
  - name: audit
    description: Audit logs
  - name: roles
    description: Role management
  - name: support
    description: Support and messaging

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/charts:
    get:
      operationId: getDashboardCharts
      tags: [dashboard]
      summary: Get dashboard chart data
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCharts"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent dashboard activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, pending]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrganizations"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    put:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}/status:
    put:
      operationId: updateOrganizationStatus
      tags: [organizations]
      summary: Activate or suspend organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, suspended]
              required: [status]
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, pending, suspended]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMembers"
    post:
      operationId: createMember
      tags: [members]
      summary: Register a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberBody"
      responses:
        "201":
          description: Created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    put:
      operationId: updateMember
      tags: [members]
      summary: Update member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}/status:
    put:
      operationId: updateMemberStatus
      tags: [members]
      summary: Approve, activate, or suspend member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, pending, suspended, approved]
              required: [status]
      responses:
        "200":
          description: Updated member status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /savings:
    get:
      operationId: listSavings
      tags: [savings]
      summary: List savings contributions
      parameters:
        - name: memberId
          in: query
          schema:
            type: integer
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of savings contributions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSavings"
    post:
      operationId: createSavingsContribution
      tags: [savings]
      summary: Record a savings contribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavingsBody"
      responses:
        "201":
          description: Created savings contribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsContribution"

  /savings/{id}/approve:
    put:
      operationId: approveSavings
      tags: [savings]
      summary: Approve a savings contribution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved contribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsContribution"

  /savings/summary:
    get:
      operationId: getSavingsSummary
      tags: [savings]
      summary: Get savings summary statistics
      responses:
        "200":
          description: Savings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsSummary"

  /loans:
    get:
      operationId: listLoans
      tags: [loans]
      summary: List all loans
      parameters:
        - name: memberId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, active, completed, defaulted, rejected]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedLoans"
    post:
      operationId: createLoan
      tags: [loans]
      summary: Create a loan application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoanBody"
      responses:
        "201":
          description: Created loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}:
    get:
      operationId: getLoan
      tags: [loans]
      summary: Get loan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}/status:
    put:
      operationId: updateLoanStatus
      tags: [loans]
      summary: Approve, reject, disburse or close a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected, active, completed, defaulted]
                note:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/summary:
    get:
      operationId: getLoanSummary
      tags: [loans]
      summary: Get loan portfolio summary
      responses:
        "200":
          description: Loan summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanSummary"

  /payroll:
    get:
      operationId: listPayrollDeductions
      tags: [payroll]
      summary: List payroll deductions
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processed, failed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of payroll deductions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPayroll"
    post:
      operationId: createPayrollDeduction
      tags: [payroll]
      summary: Create payroll deduction record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayrollBody"
      responses:
        "201":
          description: Created payroll deduction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollDeduction"

  /wallets:
    get:
      operationId: listWallets
      tags: [wallet]
      summary: List member wallets
      parameters:
        - name: memberId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of wallets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWallets"

  /wallets/{id}/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      summary: Get wallet transaction history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Wallet transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTransactions"

  /wallets/fund:
    post:
      operationId: fundWallet
      tags: [wallet]
      summary: Fund a member wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletFundBody"
      responses:
        "200":
          description: Funded wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /risk-scores:
    get:
      operationId: listRiskScores
      tags: [risk]
      summary: List member risk scores
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [low, medium, high]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of risk scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRiskScores"

  /risk-scores/{memberId}/recalculate:
    post:
      operationId: recalculateRiskScore
      tags: [risk]
      summary: Recalculate risk score for a member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated risk score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskScore"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [sms, email, in_app]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNotifications"
    post:
      operationId: sendNotification
      tags: [notifications]
      summary: Send a notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationBody"
      responses:
        "201":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /reports/savings:
    get:
      operationId: getSavingsReport
      tags: [reports]
      summary: Get savings report data
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: organizationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Savings report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsReport"

  /reports/loans:
    get:
      operationId: getLoansReport
      tags: [reports]
      summary: Get loans report data
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: organizationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Loans report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoansReport"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAuditLogs"

  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List admin roles
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleBody"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /support-tickets:
    get:
      operationId: listSupportTickets
      tags: [support]
      summary: List support tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Support tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSupportTickets"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketBody"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /support-tickets/{id}/messages:
    get:
      operationId: getSupportTicketMessages
      tags: [support]
      summary: Get messages for a support ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketMessage"
    post:
      operationId: sendTicketMessage
      tags: [support]
      summary: Send a message on a support ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
              required: [message]
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /settings:
    get:
      operationId: getSettings
      tags: [dashboard]
      summary: Get system settings
      responses:
        "200":
          description: System settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
    put:
      operationId: updateSettings
      tags: [dashboard]
      summary: Update system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        totalOrganizations:
          type: integer
        totalMembers:
          type: integer
        activeLoans:
          type: integer
        totalSavings:
          type: number
        loanRepaymentsToday:
          type: number
        pendingApprovals:
          type: integer
        overdueLoans:
          type: integer
        walletBalances:
          type: number
        memberGrowthPercent:
          type: number
        savingsGrowthPercent:
          type: number
        loanDisbursedThisMonth:
          type: number
        repaymentRate:
          type: number
      required:
        - totalOrganizations
        - totalMembers
        - activeLoans
        - totalSavings
        - loanRepaymentsToday
        - pendingApprovals
        - overdueLoans
        - walletBalances
        - memberGrowthPercent
        - savingsGrowthPercent
        - loanDisbursedThisMonth
        - repaymentRate

    DashboardCharts:
      type: object
      properties:
        monthlySavings:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        loanDisbursement:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        repaymentPerformance:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        memberGrowth:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
      required: [monthlySavings, loanDisbursement, repaymentPerformance, memberGrowth]

    ChartDataPoint:
      type: object
      properties:
        month:
          type: string
        value:
          type: number
        label:
          type: string
      required: [month, value]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        amount:
          type: number
        memberName:
          type: string
        createdAt:
          type: string
      required: [id, type, description, createdAt]

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        address:
          type: string
        contactPerson:
          type: string
        email:
          type: string
        phone:
          type: string
        payrollOfficer:
          type: string
        employeeCount:
          type: integer
        status:
          type: string
          enum: [active, suspended, pending]
        totalMembers:
          type: integer
        totalSavings:
          type: number
        activeLoans:
          type: integer
        monthlyDeductions:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - type
        - contactPerson
        - email
        - phone
        - status
        - createdAt

    CreateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        address:
          type: string
        contactPerson:
          type: string
        email:
          type: string
        phone:
          type: string
        payrollOfficer:
          type: string
        employeeCount:
          type: integer
      required: [name, type, contactPerson, email, phone]

    UpdateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        address:
          type: string
        contactPerson:
          type: string
